<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="R logo.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
  const title = "Rohit | Developer | OS • VM • AI • CP 🔥";
  let i = 0;

  function typeWriter() {
    if (i < title.length) {
      document.title = title.substring(0, i + 1);
      i++;
      setTimeout(typeWriter, 150); // typing speed
    } else {
      setTimeout(() => {
        i = 0;
        typeWriter();
      }, 2000); // wait before looping
    }
  }

  typeWriter();
</script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
